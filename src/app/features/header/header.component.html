<header class="header" [class.scrolled]="scrolled()">
  <div class="container header-inner">
    <a href="#hero" class="logo">AM</a>

    <nav class="nav-menu" [class.active]="mobileMenuOpen()">
      @for (link of navLinks; track link.key) {
        <a
          [href]="'#' + link.fragment"
          class="nav-link"
          (click)="closeMobileMenu()"
        >{{ i18n.translations().nav[link.key] }}</a>
      }
    </nav>

    <div class="header-actions">
      <button
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="themeService.theme() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'"
      >
        @if (themeService.theme() === 'light') {
          <span class="theme-icon">&#9790;</span>
        } @else {
          <span class="theme-icon">&#9788;</span>
        }
      </button>

      <div class="lang-switch">
        <button
          class="lang-btn"
          [class.active]="i18n.language() === 'de'"
          (click)="setLanguage('de')"
        >DE</button>
        <button
          class="lang-btn"
          [class.active]="i18n.language() === 'en'"
          (click)="setLanguage('en')"
        >EN</button>
      </div>

      <button
        class="mobile-toggle"
        [class.active]="mobileMenuOpen()"
        (click)="toggleMobileMenu()"
        aria-label="Menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
